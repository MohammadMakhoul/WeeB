<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign up</title>
<link rel="stylesheet" href="Login.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>
<body>
<main class="main">
    <h1>Sign in or create an account</h1>
    <h3>Log into your account with your email, or create one below. Quick and easy!</h3>

        <form onsubmit="showMessage(); return false;">
            <input type="email" id="email" placeholder="Email" required><br>
            <input type="submit" value="Continue">
        </form>

    <h3>or continue with</h3>
    <div class="social-buttons">
        <a href="https://www.facebook.com/" target="_blank">
            <img class="Photo" src="Photo/icons8-facebook-logo-48.png" alt="Facebook">
        </a>
        <a href="https://accounts.google.com/" target="_blank">
            <img class="Photo" src="Photo/icons8-google-48.png" alt="Google">
        </a>
    </div>
</main>

<script>
    function showMessage() {
        alert("You successfully logged in!");
    }
</script>
</body>
</html>
